<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đêm Cuối Tháng | Làng Hờ La 32</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/animation.css">
</head>

<body>

    <!-- Scene 1 -->
    <section id="scene1" class="scene active">
        <img src="assets/scene1.png" alt="Rừng đêm">
    </section>

    <!-- Scene 2 -->
    <section id="scene2" class="scene">
        <img src="assets/scene2.png" alt="Mũi tên">
    </section>

    <!-- Scene 3 -->
    <section id="scene3" class="scene">
        <img src="assets/scene3.png" alt="Lá thư">

        <div id="letterText">
            <h1>Đêm Cuối Tháng</h1>

            <p id="typing"></p>

            <div id="choices">
                <button id="fearBtn">😰 Tôi sợ lắm</button>
                <button id="joinBtn">😎 Đi thì đi</button>
            </div>
        </div>
    </section>

    <!-- Scene 4 -->
    <section id="scene4" class="scene">
        <img src="assets/scene4.png" alt="Móng vuốt">
    </section>

    <!-- Scene 5 -->
    <section id="scene5" class="scene">
        <img src="assets/scene5.png" alt="Đống lửa">

        <div id="ending">
            <h1>Hẹn gặp bạn tại Làng Hờ La 32</h1>

            <h2>03 / 07 • 22:00</h2>

            <p>Đừng đến trễ... hoặc đừng đến một mình.</p>
        </div>
    </section>

    <script src="script.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/typing.js"></script>
    <script src="js/audio.js"></script>

</body>
</html>
