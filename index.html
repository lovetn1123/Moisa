<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đêm Cuối Tháng | Làng Hờ La 32</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/animation.css">
</head>

<body>
<div id="intro">

    <h1>Đêm Cuối Tháng</h1>

<p>Hãy hồi đáp lời triệu hồi.<br>Chạm để hồi đáp.</p>

</div>
    <!-- Scene 1 -->
<section id="scene1" class="scene">

    <img src="assets/scene1.png" alt="Scene 1">

    <div id="storyOverlay"></div>

    <div id="storyText">
        Đêm Cuối Tháng...<br>
        Có những lời mời không nên mở.
    </div>

</section>

    <!-- Scene 2 -->
    <section id="scene2" class="scene">
    <img src="assets/scene2.png" alt="Scene 2">

    <div id="hint">
        ➜ Nhấn vào lá thư
    </div>
</section>

    <!-- Scene 3 -->
    <section id="scene3" class="scene">
    <img src="assets/scene3.png" alt="Scene 3">
<div id="storyOverlay"></div>
<div id="storyText"></div>
    <div id="choices">
        <button id="fearBtn"> Bỏ chạy</button>
        <button id="joinBtn"> Đến điểm hẹn</button>
    </div>
</section>

    <!-- Scene 4 -->
    <section id="scene4" class="scene">
    <img src="assets/scene4.png" alt="Scene 4">

    <div class="endingText" id="badEnding">
        ...
    </div>
</section>

    <!-- Scene 5 -->
    <section id="scene5" class="scene">
    <img src="assets/scene5.png" alt="Scene 5">

    <div class="endingText" id="goodEnding">
        Chào mừng đến với bầy đàn
    </div>
</section>
<audio id="bgm" loop preload="auto">
    <source src="assets/bgm.mp3" type="audio/mpeg">
</audio>
    <audio id="paperSound" preload="auto">
    <source src="assets/paper.mp3" type="audio/mpeg">
</audio>
    <audio id="wolfSound" preload="auto">
    <source src="assets/wolf.mp3" type="audio/mpeg">
</audio>
    <audio id="badEndingSound" preload="auto">
    <source src="assets/badEnding.mp3" type="audio/mpeg">
</audio>

<audio id="goodEndingSound" preload="auto">
    <source src="assets/goodEnding.mp3" type="audio/mpeg">
</audio>
    <audio id="arrowSound" preload="auto">
    <source src="assets/arrowSound.mp3" type="audio/mpeg">
</audio>
    <script src="script.js"></script>

</body>
</html>
